# =============================================================
# docker/docker-compose.yml — llm-annotation
#
# Cada pesquisador sobe sua própria instância com:
#   GPU_IDS=<n> PORT=<p> docker compose -f docker/docker-compose.yml up -d
#
# Exemplos:
#   GPU única  → GPU_IDS=0 PORT=8000 OLLAMA_PORT=11434 docker compose -f docker/docker-compose.yml up -d
#   Multi-GPU  → GPU_IDS=0,1,2 PORT=8001 OLLAMA_PORT=11435 docker compose -f docker/docker-compose.yml up -d
#   Todas GPUs → GPU_IDS=all PORT=8002 OLLAMA_PORT=11436 docker compose -f docker/docker-compose.yml up -d
#
# Portas expostas:
#   - PORT         (default 8000) → API FastAPI (fine-tuning + anotação)
#   - OLLAMA_PORT  (default 11434) → servidor Ollama (para curl direto do host)
# =============================================================
name: llm-annotation

services:
  llm-annotation:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: llm-annotation:latest

    ports:
      - "${PORT:-8000}:8000"
      - "${OLLAMA_PORT:-11434}:11434"

    environment:
      GPU_ID: "${GPU_IDS:-0}"
      CUDA_VISIBLE_DEVICES: "${CUDA_DEVICE_IDS:-0}"
      # Configuração do Ollama (lida pelo docker-entrypoint.sh)
      OLLAMA_NUM_PARALLEL: "5"
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_KV_CACHE_TYPE: "q8_0"
      OLLAMA_CONTEXT_LENGTH: "4096"
      OLLAMA_KEEP_ALIVE: "24h"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # Aceita "0", "0,1,2" ou "all"
              device_ids: ["${GPU_IDS:-0}"]
              capabilities: [gpu]

    volumes:
      - ../data:/app/data
      - ../src:/app/src
      # Persiste modelos do Ollama entre rebuilds (~5GB por modelo).
      # Sem isso, os 3 modelos seriam re-baixados toda vez que o
      # container subisse pela primeira vez.
      - ollama_models:/root/.ollama

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 120s
      timeout: 10s
      retries: 3
      # O start_period precisa ser longo o suficiente para o pull
      # inicial dos modelos (~15GB no total) na primeira subida.
      start_period: 1800s

volumes:
  ollama_models:
